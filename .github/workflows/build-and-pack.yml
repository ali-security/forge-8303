name: Build and Pack

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and pack in node:6-alpine
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            --entrypoint sh \
            node:6-alpine \
            -c "npm install && npm run build && npm pack"

      - name: Upload .tgz artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-forge-package
          path: '*.tgz'
          if-no-files-found: error
          retention-days: 1
