name: Build and Pack

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    container:
      image: node:6-alpine
      options: --entrypoint sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        shell: sh
        run: npm install

      - name: Build and pack
        shell: sh
        run: |
          npm run build
          npm pack

      - name: Upload .tgz artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-forge-package
          path: '*.tgz'
          if-no-files-found: error
